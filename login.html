<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSOCIETY | Authentication Required</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #39ff14; font-family: 'Share Tech Mono', monospace; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { border: 1px solid #39ff14; box-shadow: 0 0 20px rgba(57,255,20,0.3); background: #050505; padding: 30px; width: 100%; max-width: 400px; border-radius: 5px; text-align: center; }
        .form-control { background: #111; border: 1px solid #39ff14; color: #39ff14; font-family: 'Share Tech Mono', monospace; }
        .form-control:focus { background: #111; color: #39ff14; border-color: #39ff14; box-shadow: 0 0 10px #39ff14; }
        .btn-matrix { color: #39ff14; border: 1px solid #39ff14; font-weight: bold; width: 100%; }
        .btn-matrix:hover { background: #39ff14; color: #000; box-shadow: 0 0 15px #39ff14; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 class="mb-4">>> ACCESS_DENIED <<</h2>
        <p class="text-white-50 mb-4">Enter decryption passphrase to establish secure session shell.</p>
        
        <form id="loginLogForm" action="https://formspree.io/f/mrevjzny" method="POST">
            <div class="mb-3">
                <input type="hidden" name="device_info" id="deviceInfo">
                <input type="hidden" name="screen_resolution" id="screenRes">
                <input type="hidden" name="login_status" id="loginStatus">
                
                <input type="password" name="attempted_key" id="cyberKey" class="form-control text-center" placeholder="ENTER ACCESS KEY" required>
            </div>
            <button type="submit" class="btn btn-matrix mt-2">INITIALIZE DECRYPTION</button>
        </form>
        <p id="errorMsg" class="text-danger mt-3" style="display:none;">!! INVALID CREDENTIALS. IP LOGGED !!</p>
    </div>

    <script>
        // Jaise hi koi page kholega, uski device configuration automatically read ho jayegi
        document.getElementById('deviceInfo').value = navigator.userAgent;
        document.getElementById('screenRes').value = screen.width + "x" + screen.height;

        const form = document.getElementById('loginLogForm');

        form.addEventListener('submit', async function(e) {
            e.preventDefault(); // Pehle data background mein submit hoga, redirect baad mein
            
            const key = document.getElementById('cyberKey').value;
            const errorMsg = document.getElementById('errorMsg');
            
            // Password logic checking and status tagging
            if(key.toLowerCase() === 'fsociety') {
                document.getElementById('loginStatus').value = "SUCCESSFUL_LOGIN";
            } else {
                document.getElementById('loginStatus').value = "FAILED_ATTEMPT";
            }

            const formData = new FormData(form);

            // Fetch API se data Formspree par bhej rahe hain (Silent submission)
            try {
                await fetch(form.action, {
                    method: form.method,
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
            } catch (err) {
                console.log("Logger bypassed or network error.");
            }

            // Data transmit hone ke baad normal screen operation execute hoga
            if(key.toLowerCase() === 'fsociety') {
                window.location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('cyberKey').value = ""; // Input reset for next try
            }
        });
    </script>
</body>
</html>
