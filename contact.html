<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSOCIETY | Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            overflow-x: hidden;
        }
        .text-matrix {
            color: #39ff14 !important;
            text-shadow: 0 0 5px #39ff14;
        }
        .border-success {
            border-color: #39ff14 !important;
        }
        .form-control {
            background-color: #111;
            border: 1px solid #39ff14;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
        }
        .form-control:focus {
            background-color: #222;
            color: #39ff14;
            border-color: #39ff14;
            box-shadow: 0 0 10px #39ff14;
        }
        .btn-matrix {
            color: #39ff14;
            border-color: #39ff14;
            font-weight: bold;
        }
        .btn-matrix:hover {
            background-color: #39ff14;
            color: #000000;
            box-shadow: 0 0 15px #39ff14;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-success">
        <div class="container">
            <a class="navbar-brand text-matrix" href="index.html">[ f society ]</a>
            <div class="navbar-nav ms-auto flex-row">
                <a class="nav-link text-matrix px-2" href="index.html">// HOME</a>
                <a class="nav-link text-matrix px-2" href="contact.html">// CONTACT</a>
            </div>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 600px;">
        <h1 class="text-matrix mb-4 text-center">> ESTABLISH CONNECTION</h1>
        <p class="text-white-50 text-center mb-5">Leave an encrypted message. We are watching.</p>
        
        <form>
            <div class="mb-3">
                <label class="text-matrix mb-2">> ENCRYPTED_NAME:</label>
                <input type="text" class="form-control" placeholder="Enter name..." required>
            </div>
            <div class="mb-3">
                <label class="text-matrix mb-2">> SECURE_EMAIL:</label>
                <input type="email" class="form-control" placeholder="Enter email..." required>
            </div>
            <div class="mb-3">
                <label class="text-matrix mb-2">> MESSAGE_PAYLOAD:</label>
                <textarea class="form-control" rows="5" placeholder="Type your message here..." required></textarea>
            </div>
            <button type="submit" class="btn btn-outline-success w-100 btn-matrix mt-3">TRANSMIT DATA</button>
        </form>
    </div>

</body>
</html>
