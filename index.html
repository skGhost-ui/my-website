<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="My2ibodZNEhK4PFbQwl08zyACLJO9SufuSvav6udNq0" />
    <link rel="icon" type="image/jpeg" href="skghost-logo.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSOCIETY | GATEWAY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #39ff14; font-family: 'Share Tech Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-box { border: 1px solid #39ff14; box-shadow: 0 0 20px rgba(57,255,20,0.3); background: #050505; padding: 30px; width: 100%; max-width: 400px; border-radius: 5px; text-align: center; }
        .form-control { background: #111; border: 1px solid #39ff14; color: #39ff14; font-family: 'Share Tech Mono', monospace; }
        .form-control:focus { background: #111; color: #39ff14; border-color: #39ff14; box-shadow: 0 0 10px #39ff14; }
        .btn-matrix { color: #39ff14; border: 1px solid #39ff14; font-weight: bold; width: 100%; }
        .btn-matrix:hover { background: #39ff14; color: #000; box-shadow: 0 0 15px #39ff14; }
        .hacker-img { width: 100%; max-width: 150px; border-radius: 50%; border: 2px solid #39ff14; margin-bottom: 20px; box-shadow: 0 0 10px #39ff14; }
        
        /* Terminal Styles */
        #terminal { background: #000; color: #39ff14; padding: 15px; font-family: 'Share Tech Mono', monospace; border: 1px solid #39ff14; width: 100%; max-width: 400px; height: 150px; overflow-y: auto; text-align: left; font-size: 14px; margin-top: 20px; box-shadow: 0 0 10px rgba(57,255,20,0.2); }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="skghost-logo.jpg" alt="SK GHOST" class="hacker-img">
        <h2 class="mb-4">>> IDENTITY_REQUIRED <<</h2>
        <p class="text-white-50 mb-4">Enter your hacker alias or name to initialize terminal access.</p>
        
        <form id="welcomeForm" action="https://formspree.io/f/mrevjzny" method="POST">
            <div class="mb-3">
                <input type="hidden" name="device_info" id="deviceInfo">
                <input type="hidden" name="screen_resolution" id="screenRes">
                <input type="hidden" name="ip_address" id="userIp"> 
                <input type="text" name="visitor_alias" id="visitorAlias" class="form-control text-center" placeholder="ENTER CODENAME / NAME" required>
            </div>
            <button type="submit" class="btn btn-matrix mt-2">𝙵𝚂𝙾𝙲𝙸𝙴𝚃𝚈 SECURE SHELL</button>
        </form>
    </div>

    <!-- Terminal Log Section -->
    <div id="terminal">
        <p>> System Initializing...</p>
    </div>

    <script>
        // 1. Device Info Capture
        document.getElementById('deviceInfo').value = navigator.userAgent;
        document.getElementById('screenRes').value = screen.width + "x" + screen.height;

        // 2. Terminal Log Logic
        const terminal = document.getElementById('terminal');
        
        async function initTerminal() {
            let ip = "Hidden", isp = "Unknown", os = "Unknown", browser = "Unknown";
            
            // Get IP & ISP Information
            try {
                const response = await fetch('https://ip-api.com/json/');
                const data = await response.json();
                ip = data.query;
                isp = data.isp; 
            } catch (err) {
                ip = "127.0.0.1";
                isp = "Local_Network";
            }

            // Detect OS & Browser
            const ua = navigator.userAgent;
            if (ua.includes("Android")) os = "Android";
            else if (ua.includes("Win")) os = "Windows";
            else if (ua.includes("iPhone")) os = "iOS";
            else os = "Linux/Other";

            if (ua.includes("Chrome")) browser = "Chrome";
            else if (ua.includes("Firefox")) browser = "Firefox";
            else if (ua.includes("Safari")) browser = "Safari";
            else browser = "Unknown_Browser";

            // Logs array
            const logs = [
                ">> System Initializing...",
                ">> Target IP: " + ip,
                ">> ISP: " + isp,
                ">> OS: " + os,
                ">> Browser: " + browser,
                ">> Security Level: Vulnerable",
                ">> Firewall Status: Bypassed",
                ">> Access Granted: Welcome, SK GHOST"
            ];

            let i = 0;
            function printLogs() {
                if(i < logs.length) {
                    terminal.innerHTML += `<p>${logs[i]}</p>`;
                    terminal.scrollTop = terminal.scrollHeight;
                    i++;
                    setTimeout(printLogs, 600); 
                }
            }
            printLogs();
        }

        window.onload = initTerminal;

        // 3. Form Submission Logic
        const form = document.getElementById('welcomeForm');
        form.addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const ipField = document.getElementById('userIp');
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ipField.value = data.ip; 
            } catch (err) { ipField.value = "IP_BLOCKED"; }
            
            const formData = new FormData(form);
            try {
                await fetch(form.action, { method: form.method, body: formData, headers: { 'Accept': 'application/json' } });
            } catch (err) { console.log("Telemetry bypassed."); }
            
            window.location.href = 'home.html'; 
        });
    </script>
</body>
</html>
