<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSOCIETY | Terminal</title>
    <!-- Bootstrap CDN (Design ke liye) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Hacking Font (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* Poori website ka background aur font hacker jaisa karne ke liye */
        body {
            background-color: #000000; /* Ekdum Black */
            color: #ffffff;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            overflow-x: hidden;
        }

        /* Matrix Neon Green Color */
        .text-matrix {
            color: #39ff14 !important;
            text-shadow: 0 0 5px #39ff14; /* Glowing effect */
        }

        /* Image ko modern aur stylish banana */
        .hacker-img {
            border: 3px solid #39ff14;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
            border-radius: 10px;
            max-height: 450px;
            object-fit: cover;
            width: 100%;
        }

        /* Glowing Border for navbar */
        .border-success {
            border-color: #39ff14 !important;
            box-shadow: 0 2px 10px rgba(57, 255, 20, 0.2);
        }

        /* Hacker Button style */
        .btn-matrix {
            color: #39ff14;
            border-color: #39ff14;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .btn-matrix:hover {
            background-color: #39ff14;
            color: #000000;
            box-shadow: 0 0 15px #39ff14;
        }
    </style>
</head>
<body>

    <!-- 1. NAVIGATION BAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-success">
        <div class="container">
            <a class="navbar-brand text-matrix" href="#">[ f society ]</a>
            <div class="navbar-nav ms-auto flex-row">
                <a class="nav-link text-matrix px-2" href="#">// HOME</a>
                <a class="nav-link text-matrix px-2" href="#">// SERVICES</a>
            </div>
        </div>
    </nav>

    <!-- 2. MAIN CONTENT SECTION -->
    <div class="container my-5">
        <div class="row align-items-center">
            <!-- Left Side: Text -->
            <div class="col-md-6 mb-4 text-start">
                <h2 class="text-white">HELLO FRIEND,</h2>
                <h1 class="text-matrix display-4 fw-bold mb-3">WE ARE FSOCIETY</h1>
                <p class="text-white-50">Are you a defender or an attacker? Do you need a strong digital presence to stay a step ahead in the competition?</p>
                
                <h3 class="text-matrix h5 mt-4">> SYSTEM STATUS: ACTIVE</h3>
                <ul class="list-unstyled text-white-50">
                    <li>_ VULNERABILITY AUDIT</li>
                    <li>_ PENETRATION TESTING</li>
                    <li>_ CORE INFRASTRUCTURE BYPASS</li>
                </ul>
                <button class="btn btn-outline-success mt-3 px-4 btn-matrix">INITIALIZE TERMINAL</button>
            </div>
            
            <!-- Right Side: Mr Robot Image -->
            <div class="col-md-6 text-center">
                <!-- Yahan maine mr_robot.jpg ko images.jpeg se replace kar diya hai -->
                <img src="images.jpeg" alt="Mr Robot" class="img-fluid hacker-img">
            </div>
        </div>
    </div>

</body>
</html>
